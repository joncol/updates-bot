name: Weekly Changelog Report

on:
  schedule:
    # Every Friday at 07:40 UTC
    - cron: "45 7 * * 5"
  workflow_dispatch:
    inputs:
      since:
        description: "Look back from this date (ISO format, e.g. 2025-01-01)"
        required: false

jobs:
  report:
    runs-on: ubuntu-latest
    environment: Scrive
    steps:
      - name: Checkout updates-bot
        uses: actions/checkout@v4

      - name: Checkout kontrakcja
        uses: actions/checkout@v4
        with:
          repository: scrive/kontrakcja
          path: kontrakcja
          fetch-depth: 0  # need full history for git log --since

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL || '#updates' }}
          KONTRAKCJA_REPO: ${{ github.workspace }}/kontrakcja
          CHANGELOG_DIR: ${{ github.workspace }}/kontrakcja/doc/changelog.d
        run: |
          SINCE="${{ github.event.inputs.since }}"
          if [ -z "$SINCE" ]; then
            SINCE=$(date -d '7 days ago' +%Y-%m-%d)
          fi
          python main.py --since "$SINCE"
